name: CD
run-name: ${{ inputs.test == true && 'CD - Test' || 'CD' }}

on:
  push:
    branches:
      - main
    # The version-bump commit produced by the deploy repo's publish workflow
    # modifies src/bitwarden_workflow_linter/__about__.py. Ignoring that path
    # here prevents cd.yml from re-triggering on its own bump commit.
    paths-ignore:
      - src/bitwarden_workflow_linter/__about__.py
  workflow_dispatch:
    inputs:
      test:
        description: "Publish to Test PyPI for testing (Does not create a release)"
        required: false
        default: false
        type: boolean
      version_bump_type:
        description: "Bump type override. Default 'skip' so manual runs don't accidentally publish."
        required: false
        default: skip
        type: choice
        options:
          - skip
          - patch
          - minor
          - major

permissions: {}

jobs:
  deploy:
    name: Trigger publish via deploy repo
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - name: Build trigger data
        id: data
        env:
          TEST: ${{ inputs.test || false }}
          BUMP_TYPE: ${{ inputs.version_bump_type || '' }}
        run: |
          JSON=$(jq -nc \
            --argjson test "$TEST" \
            --arg bump_type "$BUMP_TYPE" \
            '{test: $test, version_bump_type: $bump_type}')
          echo "json=$JSON" >> "$GITHUB_OUTPUT"

      - name: Trigger publish
        uses: bitwarden/gh-actions/trigger-actions@main
        with:
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          task: publish-workflow-linter
          data: ${{ steps.data.outputs.json }}
